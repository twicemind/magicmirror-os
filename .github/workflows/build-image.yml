name: Build MagicMirror OS Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - test

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo apt-get clean
          df -h

      - name: Setup build environment
        run: |
          sudo apt-get update
          sudo ./scripts/setup-build-env.sh

      - name: Build image
        run: |
          sudo ./build.sh
        timeout-minutes: 120

      - name: Calculate checksums
        run: |
          cd deploy
          sha256sum *.img.xz > SHA256SUMS
          cat SHA256SUMS

      - name: Get version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION="nightly-$(date +%Y%m%d)"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: magicmirror-os-${{ steps.version.outputs.version }}
          path: |
            deploy/*.img.xz
            deploy/*.sha256
            deploy/SHA256SUMS
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: |
            deploy/*.img.xz
            deploy/SHA256SUMS
          body: |
            # MagicMirror OS ${{ steps.version.outputs.version }}
            
            ## Installation
            
            1. Download the `.img.xz` file
            2. Flash to SD card using Raspberry Pi Imager or Etcher
            3. Insert SD card into Raspberry Pi
            4. Boot and login with:
               - User: `mm`
               - Password: `magicmirror`
            
            ## Checksums
            
            Verify download integrity:
            ```bash
            sha256sum -c SHA256SUMS
            ```
            
            ## What's Included
            
            - Raspberry Pi OS Lite 64-Bit (Bookworm)
            - User `mm` with default password
            - SSH enabled
            - German locale (de_DE.UTF-8)
            
            ## Documentation
            
            - [Quick Start](QUICKSTART.md)
            - [Building Guide](docs/BUILDING.md)
            - [Changelog](CHANGELOG.md)
            
            **⚠️ Important:** Change the default password after first boot!
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: |
          sudo rm -rf pi-gen/work
          sudo rm -rf work
